services:
  sphere86:
    image: sphere86:latest
    build: .
    container_name: sphere86
    hostname: ${SPHERE86_CONTAINER_HOSTNAME:-sphere86}
    restart: unless-stopped
    privileged: true
    network_mode: bridge
    shm_size: "1gb"
    ports:
      - "3000:3000"
      - "47984:47984/tcp"
      - "47989:47989/tcp"
      - "47990:47990/tcp"
      - "47991:47991/tcp"
      - "48010:48010/tcp"
      - "47984:47984/udp"
      - "47989:47989/udp"
      - "47998-48010:47998-48010/udp"
    environment:
      - SPHERE86_SECRET=${SPHERE86_SECRET:-change-me-in-production}
      - DATABASE_URL=file:/data/sphere86/config/sphere86.db
      - SPHERE86_DATA_ROOT=/data/sphere86
      - NODE_ENV=production
      - SPHERE86_SINGLE_IMAGE_MODE=true
      - SPHERE86_EMBEDDED_HOST=true
      - SPHERE86_EMBEDDED_HOST_NAME=${SPHERE86_EMBEDDED_HOST_NAME:-Embedded Local Host}
      - SPHERE86_SUNSHINE_NAME=${SPHERE86_SUNSHINE_NAME:-Embedded Local Host}
      - SPHERE86_EMBEDDED_HOST_ADDRESS=127.0.0.1
      - SPHERE86_EMBEDDED_HOST_PORT=47990
      - SPHERE86_EMBEDDED_SUNSHINE_SCHEME=auto
      - SPHERE86_EMBEDDED_CONFIG_BASE_PATH=/data/86box
      - SPHERE86_EMBEDDED_86BOX_BINARY_PATH=/usr/local/bin/86Box
      - SPHERE86_EMBEDDED_X11_DISPLAY=:0
      - SUNSHINE_CONFIG_BASE_PATH=/data/sunshine
      - BOX86_CONFIG_BASE_PATH=/data/86box
      - BOX86_BINARY_PATH=/usr/local/bin/86Box
      - BOX86_ROMS_PATH=/opt/86box/roms
      - SUNSHINE_STREAM_PORT=47989
      - SPHERE86_FORCE_XTEST_INPUT=${SPHERE86_FORCE_XTEST_INPUT:-false}
      - SPHERE86_USE_XORG=${SPHERE86_USE_XORG:-auto}
      - SUNSHINE_WEB_USERNAME=${SUNSHINE_WEB_USERNAME:-admin}
      - SUNSHINE_WEB_PASSWORD=${SUNSHINE_WEB_PASSWORD:-sunshine}
      - SUNSHINE_FORCE_INIT_CREDS=${SUNSHINE_FORCE_INIT_CREDS:-false}
      # Optional: temporary GitHub API token to avoid low anonymous rate limits during bootstrap.
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_API_TOKEN=${GITHUB_API_TOKEN:-}
      - BOX_USER=${BOX_USER:-sphere86}
    volumes:
      # Set SPHERE86_DATA_DIR in a .env file before first start.
      - ${SPHERE86_DATA_DIR:-/SET_THIS_PATH_FOR_SPHERE86_DATA}:/data
    # Used by Docker as the service health status (`docker compose ps`, orchestrators).
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
